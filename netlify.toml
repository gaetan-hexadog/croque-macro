[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Assistant repas : function serverless (clé Anthropic en variable d'env Netlify)
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA : toutes les routes renvoient vers index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# en-têtes utiles pour la PWA
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
