[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Netlify héberge le FRONT (build Vite). L'assistant IA tourne en Supabase Edge Function
# (supabase/functions/assistant) — plus de function serverless Netlify.

# SPA : toutes les routes renvoient vers index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# en-têtes utiles pour la PWA
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
